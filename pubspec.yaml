name: retail_app
description: White-label Flutter retail commerce platform
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_storage: ^11.6.10
  firebase_messaging: ^14.8.3

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^13.2.5

  # UI helpers
  cached_network_image: ^3.3.1
  google_fonts: ^6.0.0

  # Utils
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.7.0
  google_sign_in: ^6.2.1
  crypto: ^3.0.3

  http: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/config/
    - .env
