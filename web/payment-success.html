<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Successful</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0;
           background: #f5f5f5; }
    .card { background: white; padding: 40px; border-radius: 16px;
            text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #2E7D32; margin: 0 0 8px; }
    p { color: #666; margin: 0 0 24px; }
    a { display: inline-block; background: #1A1A2E; color: white;
        padding: 12px 24px; border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Your order has been placed. You can close this page and return to the app.</p>
    <a href="javascript:window.close()">Close Page</a>
  </div>
</body>
</html>
